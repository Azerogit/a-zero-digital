<!doctype html>
<html lang="en-SG">
  <head>
    <script>
      (function () {
        var stored = localStorage.getItem('az-theme');
        var theme = stored ? stored : 'dark';
        if (theme === 'dark') document.documentElement.classList.add('dark');
      })();
    </script>
    <script>
      // Restore path encoded by 404.html for GitHub Pages SPA routing
      (function () {
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
        var search = location.search;
        if (search && search.indexOf('?p=') === 0) {
          var decoded = search.slice(1).split('&').reduce(function (o, x) {
            var s = x.split('='); o[s[0]] = s[1]; return o;
          }, {});
          if (decoded.p) {
            history.replaceState(
              null, null,
              location.pathname.replace(/\/$/, '') + '/' + decoded.p.replace(/~and~/g, '&') +
              (decoded.q ? '?' + decoded.q.replace(/~and~/g, '&') : '') +
              location.hash
            );
          }
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>A-zero Digital | AI-Powered Marketing &amp; Data Science Consultancy Singapore</title>
    <meta
      name="description"
      content="Singapore's AI-driven marketing consultancy. We bridge advanced data science with measurable marketing ROI through machine learning, predictive analytics, and intelligent automation."
    />
    <link rel="canonical" href="https://a-zero.co" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://a-zero.co" />
    <meta property="og:title" content="A-zero Digital | AI-Powered Marketing &amp; Data Science Consultancy Singapore" />
    <meta
      property="og:description"
      content="Singapore's AI-driven marketing consultancy. We bridge advanced data science with measurable marketing ROI through machine learning, predictive analytics, and intelligent automation."
    />
    <meta property="og:site_name" content="A-zero Digital" />
    <meta property="og:locale" content="en_SG" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="A-zero Digital | AI-Powered Marketing &amp; Data Science Consultancy Singapore" />
    <meta
      name="twitter:description"
      content="Singapore's AI-driven marketing consultancy. We bridge advanced data science with measurable marketing ROI."
    />

    <!-- Fonts: Inter (body) + DM Mono (data labels) via Google Fonts -->
    <!-- SF Pro Display loaded via system font stack — no external load needed -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
